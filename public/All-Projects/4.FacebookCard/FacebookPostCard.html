<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Card</title>
    <link rel="stylesheet" href="FaceboookPostCard.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <div class="person">
          <div class="dp">
            <img class="dpimg" src="../Media/quoteDP.jpg" alt="" />
          </div>
          <div class="details">
            <div class="name">quotes_off_us</div>
            <div class="name-foot">
              <div class="sponsored">Sponsored</div>
              <div class="sponsored-img">
                <img class="adimg" src="../Media/adSign.png" alt="" />
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="body1">
          <div class="msg-div">
            <p class="msg">
              Find Daily Quotes <br />
              Be Motivated, Be Gentle,Be Quotes🤭👊 <br />
              Follow 👣 for more <br />
              <span id="hash">#motivationaltalks #lifequotes #quotes</span>
            </p>
          </div>
          <div class="content">
            <div class="content-img">
              <img class="realquote" src="../Media/quote.jpg" alt="" />
            </div>
            <div class="content-footer">
              <div class="textx">
                <span class="textx1">websitename.com</span>
                <div class="textx2">tagline goes here</div>
              </div>
              <div class="btnx">
                <button class="realBtn">learn more</button>
              </div>
            </div>
          </div>
        </div>
        <div class="body2">
          <div class="interation">
            <div class="itr1">
              <div class="itr1-img">
                <img class="itr-img heart" src="../Media/like.png" alt="" />
                <img class="itr-img like" src="../Media/heart.png" alt="" />
              </div>
              <div class="itr1-num">4,220</div>
            </div>
            <div class="itr2">
              <div class="itr2-a">
                <div class="57num">57</div>
                <div class="Comments">Comments</div>
              </div>
              <div class="itr2-b">
                <div class="117num">177</div>
                <div class="Comments">Shares</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <div class="like">
          <div class="like-img"><img class="footImg like" src="../Media/thumbLike.png" alt=""></div>
          <div class="like-name">Like</div>
        </div>
        <div class="comment">
          <div class="comment-img"><img class="footImg cmt" src="../Media/comment.png" alt=""></div>
          <div class="comment-name">Comment</div>
        </div>
        <div class="share">
          <div class="share-img"><img class="footImg share" src="../Media/share.png" alt=""></div>
          <div class="share-name">Share</div>
        </div>
        <div class="profile">
          <div class="profile-img">
            <img class="dpimg b" src="../Media/quoteDP.jpg" alt="" />
          </div>
          <div class="down">
            <img class="footImg down" src="../Media/down.png" alt="" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
