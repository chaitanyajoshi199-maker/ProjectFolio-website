<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ocean Glass</title>
    <style>
      body {
        width: 100%;
        height: 100vh;
        background-image: url(../Media/oceanSunset.jpg);
        background-size: cover;
        background-attachment: fixed;
        font-family: Arial, Helvetica, sans-serif;
        color: rgb(255, 255, 255);
      }
      .menu {
        display: grid;
        grid-template-columns: 1fr 5fr;
        column-gap: 450px;
      }
      .logo {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 10px;
        margin-top: 10px;
        line-height: 70px;
        margin-left: 50px;
        padding: 0px 15px;
        /* transparency */
      }
      .logo-img {
        width: 35px;
        margin-top: 15.9px;
      }
      .logo-name {
        font-size: 35px;
        color: white;
        font-family: arial;
        font-weight: bold;
      }
      .Navbar {
       
        display: flex;
        gap: 10px;
        padding: 10px;
        line-height: 70px;
        margin-top: 10px;
        margin-right: 50px;
        justify-content: space-evenly;
        background-color: rgba(202, 202, 202, 0);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        border-radius: 50px;
        backdrop-filter: blur(7.3px);
        -webkit-backdrop-filter: blur(7.3px);
        border: 0.2px solid rgba(202, 202, 202, 0.1);
        transition: padding 0.5s;
      }
      .Navbar:hover {
        padding: 15px;
      }
      .bt {
         font-size: 20px;
        background-color: rgba(202, 202, 202, 0);
        color: white;
        border: none;
        transition: padding 0.3s;
      }
      .bt:hover {
        padding: 15px;
        background-color: rgba(202, 202, 202, 0);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        border-radius: 50px;
        backdrop-filter: blur(7.5px);
        -webkit-backdrop-filter: blur(7.5px);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      .bar {
        width: 60px;
        position: fixed;
        right: 30px;
        top: 30px;
        display: none;
      }
      @media (max-width: 800px) and (min-width: 600px) {
        .menu {
          column-gap: 350px;
        }
      }
      @media (min-width: 350px) {
        .menu {
          column-gap: 150px;
        }
      }
      @media (max-width: 700px) {
        .bar {
          display: block;
          background-color: rgba(202, 202, 202, 0);
          border-radius: 50px;
          box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
          backdrop-filter: blur(7.3px);
          -webkit-backdrop-filter: blur(7.3px);
          border: 1px solid rgba(202, 202, 202, 0.1);
          transition: padding 0.3s;
        }
        .bar:hover{
            padding: 3px;
        }

        .Navbar {
          display: block;
          position: absolute;
          width: 80%;
          min-height: 60%;
          top: 80px;
          left: 50px;
          text-align: center;
          padding-bottom: 20px;
          font-size: 40px;
        }
        #bar:checked ~ Navbar{
            left: 0;
        }
      }
      @media (max-width:345px) {
        .bar{
            display: none;
        }
      }

    </style>
  </head>
  <body>
    <div class="big">
      <div class="menu">
        <div class="logo">
          <div>
            <img
              class="logo-img"
              src="../Media/brandLogo.png"
              alt=""
            />
          </div>
          <div class="logo-name">DesignX</div>
        </div>
        <div class="Navbar">
          <div><button class="bt">Home</button></div>
          <div><button class="bt">Product</button></div>
          <div><button class="bt">Service</button></div>
          <div><button class="bt">Contact</button></div>
          <div><button class="bt">Feedback</button></div>
        </div>
        <div>
          <img class="bar" src="Media/InShot_20251115_001722605.png" alt="" />
        </div>
      </div>

      <div class="products"></div>
    </div>
  </body>
</html>
