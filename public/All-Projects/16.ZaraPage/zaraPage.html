<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navbar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
</head>

<body>
  <nav class="navbar navbar-expand-md shadow shadow-md">
    <div class="container-xxl">
      <a href="#zara.com" class="navbar-brand">
        <img src="../Media/zaraLogo.png" alt="" width="120px">
      </a>

      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#main-nav" aria-controls="main-nav"
        aria-expanded="false" aria-label="Toggle navigation" type="button">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end text-light" id="main-nav">
        <ul class="navbar-nav ">
          <li class="nav-item mx-4"><a href="#home" class="nav-link text-dark">HOME</a></li>

          <li class="nav-item mx-4">
            <a href="#Women" class="nav-link text-dark">WOMEN</a>
          </li>
          <li class="nav-item mx-4">
            <a href="#Men" class="nav-link text-dark">MEN</a>
          </li>
          <li class="nav-item mx-4">
            <a href="#Kids" class="nav-link text-dark">KIDS</a>
          </li>
          <li class="nav-item d-md-none mx-4">
            <a href="#Trends" class="nav-link text-dark">TRENDS</a>
          </li>
          <li class="nav-item ms-2 d-none d-md-inline ">
            <a href="#Buy" class="nav-link btn btn-dark bg-opacity-50 text-light px-3 mx-4">BUY</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

    <section id="intro">
    <div class="container-lg mt-4">
      <div class="row justify-content-center align-items-center">
        <div class="col-md-5 text-center text-md-start">
          <h1>
            <div class="display-5 fw-bold">Zara Men's Leather Jacket</div>
            <div class="display-6">New Jacket Series</div>
            <p class="text-muted lead my-4">
              Introducing all new Zara Jackets for Men
            </p>
          </h1>
          <a href="#pricing" class="btn btn-dark">Buy Now</a>
        </div>
        <div class="col-md-5 text-center d-none d-md-block">
          <img class="img-fluid rounded-1" src="../Media/zaraProduct.png" alt="laptop" />
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
