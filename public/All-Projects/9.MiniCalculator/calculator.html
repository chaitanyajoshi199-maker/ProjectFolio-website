<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>basic addition calculator</title>
    <link rel="stylesheet" href="calculator.css" />
  </head>
  <body>
    <div class="calculator">
        <div class="name">calculator</div>
      <div class="input-div">
        <div><input id="inp1" class="input a" type="text"/></div>
        <div><input id="inp2" class="input b" type="text" /></div>
        <div><input id="inp3" class="input c" type="text" /></div>
      </div>

      <div id="btn" class="output-div">
        <button class="btn" id="btnx">=</button>
        <div id="ans" class="answer">300</div>
      </div>
    </div>
    <script src="calculator.js"></script>
  </body>
</html>
